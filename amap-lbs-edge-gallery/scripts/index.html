<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AMap LBS Skill Runtime</title>
  </head>
  <body>
    <script>
      (function () {
        const BASE = "https://restapi.amap.com";
        const MAX_PAYLOAD_LENGTH = 4 * 1024;
        const MAX_KEYWORDS_LENGTH = 200;
        const MAX_CITY_LENGTH = 100;
        const MAX_TYPES_LENGTH = 200;
        const MAX_OFFSET = 20;
        const MAX_PAGE = 3;
        const MAX_HEATMAP_PAGES = 3;

        function jsonOk(result) {
          return JSON.stringify({ result });
        }

        function jsonErr(message, details) {
          return JSON.stringify({
            error: {
              message: String(message || "Unknown error"),
              details: details || null,
            },
          });
        }

        function ensure(input, field) {
          if (!input || input[field] === undefined || input[field] === null || input[field] === "") {
            throw new Error(`Missing required field: ${field}`);
          }
        }

        function ensureMaxStringLength(input, field, maxLength) {
          if (!input || input[field] === undefined || input[field] === null) return;
          const value = String(input[field]);
          if (value.length > maxLength) {
            throw new Error(`${field} too long`);
          }
        }

        function ensureMaxNumber(input, field, maxValue) {
          if (!input || input[field] === undefined || input[field] === null || input[field] === "") return;
          const value = Number(input[field]);
          if (!Number.isFinite(value)) {
            throw new Error(`${field} invalid`);
          }
          if (value > maxValue) {
            throw new Error(`${field} too large`);
          }
        }

        function validateParams(params, intent) {
          ensureMaxStringLength(params, "keywords", MAX_KEYWORDS_LENGTH);
          ensureMaxStringLength(params, "city", MAX_CITY_LENGTH);
          ensureMaxStringLength(params, "types", MAX_TYPES_LENGTH);
          ensureMaxNumber(params, "offset", MAX_OFFSET);
          ensureMaxNumber(params, "page", MAX_PAGE);

          if (intent === "heatmap") {
            ensureMaxNumber(params, "pages", MAX_HEATMAP_PAGES);
          }
        }

        function buildQuery(params) {
          const query = new URLSearchParams();
          Object.entries(params || {}).forEach(([k, v]) => {
            if (v !== undefined && v !== null && v !== "") query.set(k, String(v));
          });
          return query.toString();
        }

        async function callAmap(path, params) {
          const url = `${BASE}${path}?${buildQuery(params)}`;
          const resp = await fetch(url, { method: "GET" });
          if (!resp.ok) {
            throw new Error(`AMap HTTP error: ${resp.status}`);
          }
          const data = await resp.json();
          if (Object.prototype.hasOwnProperty.call(data, "errcode") && String(data.errcode) !== "0") {
            throw new Error(data.errmsg || data.errdetail || `AMap API error: ${data.errcode}`);
          }
          if (data.status && String(data.status) !== "1") {
            throw new Error(data.info || data.infocode || "AMap API rejected request");
          }
          return data;
        }

        function normalizePoi(poi) {
          const [lng, lat] = (poi.location || "").split(",").map(Number);
          return {
            id: poi.id,
            name: poi.name,
            address: poi.address,
            type: poi.type,
            location: poi.location,
            lng,
            lat,
          };
        }

        async function keywordSearch(apiKey, params) {
          ensure(params, "keywords");
          const data = await callAmap("/v3/place/text", {
            key: apiKey,
            keywords: params.keywords,
            city: params.city,
            types: params.types,
            offset: params.offset || 20,
            page: params.page || 1,
            extensions: "base",
          });
          return {
            count: Number(data.count || 0),
            pois: (data.pois || []).map(normalizePoi),
            raw: data,
          };
        }

        async function nearbySearch(apiKey, params) {
          ensure(params, "location");
          const data = await callAmap("/v3/place/around", {
            key: apiKey,
            location: params.location,
            radius: params.radius || 3000,
            keywords: params.keywords,
            types: params.types,
            sortrule: params.sortrule || "distance",
            offset: params.offset || 20,
            page: params.page || 1,
            extensions: "base",
          });
          return {
            count: Number(data.count || 0),
            pois: (data.pois || []).map(normalizePoi),
            raw: data,
          };
        }

        async function routePlanning(apiKey, params) {
          ensure(params, "origin");
          ensure(params, "destination");
          const mode = params.mode || "driving";
          const routePathMap = {
            driving: "/v5/direction/driving",
            walking: "/v3/direction/walking",
            bicycling: "/v4/direction/bicycling",
          };
          const path = routePathMap[mode];
          if (!path) {
            throw new Error("mode must be one of: driving, walking, bicycling");
          }

          const query = {
            key: apiKey,
            origin: params.origin,
            destination: params.destination,
          };

          if (mode === "driving") query.strategy = params.strategy || 0;

          const data = await callAmap(path, query);
          return {
            mode,
            route: data.route || null,
            raw: data,
          };
        }

        async function heatmap(apiKey, params) {
          ensure(params, "location");
          const pages = Number(params.pages || 3);
          const offset = Number(params.offset || 25);
          const tasks = [];

          for (let page = 1; page <= pages; page += 1) {
            tasks.push(
              callAmap("/v3/place/around", {
                key: apiKey,
                location: params.location,
                radius: params.radius || 5000,
                keywords: params.keywords,
                types: params.types,
                sortrule: params.sortrule || "distance",
                offset,
                page,
                extensions: "base",
              })
            );
          }

          const pagesData = await Promise.all(tasks);
          const pois = pagesData.flatMap((d) => d.pois || []);

          const points = pois
            .map((poi) => {
              const [lng, lat] = (poi.location || "").split(",").map(Number);
              if (!Number.isFinite(lng) || !Number.isFinite(lat)) return null;
              return { lng, lat, weight: 1 };
            })
            .filter(Boolean);

          return {
            total: points.length,
            points,
          };
        }

        async function handle(payloadText, secret) {
          if (typeof payloadText === "string" && payloadText.length > MAX_PAYLOAD_LENGTH) {
            throw new Error("payload too large");
          }
          const payload = typeof payloadText === "string" ? JSON.parse(payloadText) : payloadText;
          ensure(payload, "intent");
          const apiKey = secret;
          if (!apiKey) {
            throw new Error("Missing AMap API key secret");
          }

          const { intent, params = {} } = payload;
          validateParams(params, intent);

          if (intent === "keyword_search") return jsonOk(await keywordSearch(apiKey, params));
          if (intent === "nearby_search") return jsonOk(await nearbySearch(apiKey, params));
          if (intent === "route_planning") return jsonOk(await routePlanning(apiKey, params));
          if (intent === "heatmap") return jsonOk(await heatmap(apiKey, params));

          return jsonErr("Unsupported intent");
        }

        window.ai_edge_gallery_get_result = async function (payloadText, secret) {
          try {
            return await handle(payloadText, secret);
          } catch (err) {
            return jsonErr(err && err.message ? err.message : String(err));
          }
        };
      })();
    </script>
  </body>
</html>
