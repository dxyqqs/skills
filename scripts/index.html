<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>amap-lbs-skill</title>
</head>
<body>
<script>
  window['ai_edge_gallery_get_result'] = async (data, secret) => {
    try {
      const input = JSON.parse(data || '{}');
      const apiKey = (secret || '').trim();

      if (!apiKey) {
        return JSON.stringify({
          ok: false,
          error: 'Missing API key. Please provide AMap Web Service API Key in secret dialog.'
        });
      }

      const keyword = (input.keyword || '').trim();
      const city = (input.city || '').trim();

      if (!keyword) {
        return JSON.stringify({
          ok: false,
          error: 'Missing required field: keyword'
        });
      }

      const params = new URLSearchParams({
        keywords: keyword,
        key: apiKey
      });

      if (city) {
        params.set('city', city);
      }

      const url = `https://restapi.amap.com/v3/place/text?${params.toString()}`;
      const response = await fetch(url);
      const result = await response.json();

      return JSON.stringify({
        ok: true,
        result
      });
    } catch (error) {
      return JSON.stringify({
        ok: false,
        error: String(error && error.message ? error.message : error)
      });
    }
  };
</script>
</body>
</html>
